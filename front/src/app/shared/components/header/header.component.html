<header class="header-banner">
  <div class="header-content">

    <div class="logo" (click)="navigateTo('/dashboard')">
      <img src="/assets/logo_p6.png" alt="logo" />
    </div>

    <nav *ngIf="showMenu && isAuthenticated" class="nav-menu">
      <button class="btn-logout" (click)="logout()">Se déconnecter</button>
      <a class="nav-link" routerLink="/articles" routerLinkActive="active">Articles</a>
      <a class="nav-link" routerLink="/themes" routerLinkActive="active">Thèmes</a>
      <button class="btn-profile" (click)="navigateTo('/profile')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </nav>

    <button
      *ngIf="showMenu && isAuthenticated"
      class="burger"
      (click)="toggleMobileMenu()"
      [class.open]="mobileMenuOpen"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <div class="mobile-menu" *ngIf="showMenu && isAuthenticated && mobileMenuOpen">
    <button class="btn-logout" (click)="logout()">Se déconnecter</button>
    <a class="nav-link" routerLink="/articles" routerLinkActive="active" (click)="toggleMobileMenu()">Articles</a>
    <a class="nav-link" routerLink="/themes" routerLinkActive="active" (click)="toggleMobileMenu()">Thèmes</a>
    <button class="btn-profile-mobile" (click)="navigateTo('/profile'); toggleMobileMenu()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </button>
  </div>
</header>
