<header class="header-banner">
  <div class="header-content">

    <div class="logo" (click)="navigateTo('/dashboard')">
      <img src="/assets/logo_p6.png" alt="logo" />
    </div>

    <!-- Nav desktop -->
    <nav *ngIf="showMenu && isAuthenticated" class="nav-menu">
      <button class="btn-logout" (click)="logout()">Se déconnecter</button>
      <a class="nav-link" routerLink="/articles" routerLinkActive="active">Articles</a>
      <a class="nav-link" routerLink="/themes" routerLinkActive="active">Thèmes</a>
      <button class="btn-profile" (click)="navigateTo('/profile')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </nav>

    <!-- Burger mobile -->
    <button
      *ngIf="showMenu && isAuthenticated"
      class="burger"
      (click)="toggleMobileMenu()"
      [class.open]="mobileMenuOpen"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>

<!-- Overlay + Drawer : toujours dans le DOM si authentifié, visibilité gérée par CSS -->
<ng-container *ngIf="showMenu && isAuthenticated">

  <div
    class="drawer-overlay"
    [class.overlay-visible]="mobileMenuOpen"
    (click)="toggleMobileMenu()"
  ></div>

  <div class="drawer" [class.drawer-open]="mobileMenuOpen">

    <button class="btn-logout" (click)="logout(); toggleMobileMenu()">Se déconnecter</button>
    <a class="nav-link" routerLink="/articles" routerLinkActive="active" (click)="toggleMobileMenu()">Articles</a>
    <a class="nav-link" routerLink="/themes" routerLinkActive="active" (click)="toggleMobileMenu()">Thèmes</a>

    <!-- Icône profil en bas -->
    <div class="drawer-bottom">
      <button class="btn-profile-drawer" (click)="navigateTo('/profile'); toggleMobileMenu()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </div>

  </div>

</ng-container>
