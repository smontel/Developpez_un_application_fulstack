<div class="comment-section">
  <h2 class="section-title">Commentaires</h2>

  <div class="comment-list">
    <div class="comment-item" *ngFor="let comment of comments">
      <div class="comment-meta">
        <span class="comment-author">{{ comment.authorName }}</span>
        <span class="comment-date">{{ comment.createdAt | date:'dd/MM/yyyy' }}</span>
      </div>
      <p class="comment-message">{{ comment.message }}</p>
    </div>

    <p *ngIf="comments.length === 0" class="no-comments">Aucun commentaire pour l'instant.</p>
  </div>

  <form class="comment-form" [formGroup]="commentForm" (ngSubmit)="submit()">
    <textarea
      formControlName="message"
      placeholder="Ajouter un commentaire..."
      rows="4">
    </textarea>
    <button type="submit" [disabled]="commentForm.invalid || isSubmitting">
      Envoyer
    </button>
    <p *ngIf="error" class="error">{{ error }}</p>
  </form>
</div>
