<app-header [showMenu]="true"></app-header>

<div class="creation-container">
  <button class="btn-back" (click)="goBack()">&#8592;</button>

  <h1 class="page-title">Créer un article</h1>

  <form [formGroup]="articleForm" (ngSubmit)="submit()">

    <div class="form-group">
      <label for="theme">Thème</label>
      <select id="theme" formControlName="theme_ids">
        <option value="" disabled selected>Sélectionner un thème</option>
        <option *ngFor="let theme of themes" [value]="theme.id">{{ theme.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="title">Titre</label>
      <input
        type="text"
        id="title"
        formControlName="title"
        placeholder="Titre de l'article"
      />
    </div>

    <div class="form-group">
      <label for="content">Contenu</label>
      <textarea
        id="content"
        formControlName="content"
        placeholder="Contenu de l'article..."
        rows="10">
      </textarea>
    </div>

    <div *ngIf="error" class="error">{{ error }}</div>

    <button
      type="submit"
      class="btn-submit"
      [disabled]="articleForm.invalid || isSubmitting">
      Créer
    </button>

  </form>
</div>
